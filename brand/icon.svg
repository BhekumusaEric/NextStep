<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#000000" rx="220"/>

  <!-- Staircase steps rising left to right, forming an upward arrow shape -->
  <!-- Each step: a horizontal tread + vertical riser, building upward -->
  <!-- Base color: primary purple with mint accent on top step -->

  <!-- Step 1 (bottom left) -->
  <rect x="180" y="680" width="180" height="60" rx="18" fill="#6D5DF6"/>
  <!-- Step 1 riser -->
  <rect x="300" y="560" width="60" height="180" rx="18" fill="#6D5DF6"/>

  <!-- Step 2 (middle) -->
  <rect x="300" y="560" width="180" height="60" rx="18" fill="#6D5DF6"/>
  <!-- Step 2 riser -->
  <rect x="420" y="440" width="60" height="180" rx="18" fill="#6D5DF6"/>

  <!-- Step 3 (top right) -->
  <rect x="420" y="440" width="180" height="60" rx="18" fill="#6D5DF6"/>
  <!-- Step 3 riser -->
  <rect x="540" y="320" width="60" height="180" rx="18" fill="#6D5DF6"/>

  <!-- Top platform -->
  <rect x="540" y="320" width="180" height="60" rx="18" fill="#4ECDC4"/>

  <!-- Arrow head pointing up-right on top step -->
  <polygon points="750,280 820,350 750,350" fill="#4ECDC4"/>
  <polygon points="750,280 820,280 820,350" fill="#4ECDC4"/>
</svg>
